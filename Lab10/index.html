<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Візитка</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Максим Степаняк</h1>
      <p>Front-end Developer (Student)</p>
    </header>

    <main>
      <section id="about">
        <h2>Про себе</h2>
        <p>
          Я студент, який вивчає веб-технології. Цікавлюсь HTML, CSS та
          JavaScript, люблю створювати прості та функціональні веб-сторінки.
        </p>
      </section>

      <section id="skills">
        <h2>Навички</h2>
        <ul>
          <li>HTML5</li>
          <li>CSS3</li>
          <li>JavaScript (ES6+)</li>
        </ul>
      </section>

      <section id="contact">
        <h2>Контакти</h2>

        <form id="contactForm">
          <input type="text" id="name" placeholder="Ім’я" />
          <input type="email" id="email" placeholder="Email" />
          <textarea id="message" placeholder="Повідомлення"></textarea>
          <button type="submit">Відправити</button>
        </form>
      </section>
    </main>

    <footer>
      <p>© 2026 Всі права захищені</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
